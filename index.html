    const a=attHist(p,si), r=hasReplay(p,si);
    if(!a&&r){
      if(s.date){const d=new Date(String(s.date).replace(/[./]/g,'-').slice(0,10));if(!isNaN(d)){const days=(Date.now()-d.getTime())/86400000;if(days>=7)found=true;}}
      else found=true;
    }
  });
  return found;
}

function setG(g,btn){curG=g;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}

function render(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  let pool=PEOPLE.filter(p=>!q||p.name.toLowerCase().includes(q));
  pool.forEach(p=>{p.__g=classify(p);});
  const list=document.getElementById('list');list.innerHTML='';

  if(curG==='all'){
    ['green','yellow','red'].forEach(g=>{
      const items=pool.filter(p=>p.__g===g);
      if(!items.length)return;
      renderGroup(g,items,list);
    });
  }else if(curG==='risk'){
    renderGroup('risk',pool.filter(isRisk),list);
  }else if(curG==='followup'){
    renderGroup('followup',pool.filter(isFollowup),list);
  }else{
    const items=pool.filter(p=>p.__g===curG);
    renderGroup(curG,items,list);
  }
  if(!list.children.length)list.innerHTML='<div class="empty" style="padding:30px 0;text-align:center">沒有符合的學員</div>';
}

function renderGroup(g,items,list){
  const meta=GROUP_META[g];
  const gh=document.createElement('div');
  gh.className='group';
  gh.innerHTML='<div class="group-h"><span class="group-icon">'+meta.icon+'</span><span class="group-t">'+meta.title+'</span><span class="group-c">'+items.length+' 人</span></div><div class="group-desc">'+meta.desc+'</div>';
  list.appendChild(gh);
  items.forEach(p=>{
    const card=document.createElement('div');
    card.className='card';
    let attended=0,opened=0,replayed=0,missedNoRep=0;
    SESSIONS.forEach((s,si)=>{
      if(s.editable)return; // 會前版只看歷史場次
      opened++;
      const a=attHist(p,si), r=hasReplay(p,si);
      if(a)attended++;
      if(r)replayed++;
      if(!a&&!r)missedNoRep++;
    });
    let sm='<span class="sm-item sm-att">出席 '+attended+'/'+opened+'</span>'+
      '<span class="sm-item sm-rep">回放 '+replayed+'/'+opened+'</span>';
    if(missedNoRep>0)sm+='<span class="sm-item sm-miss">缺席未補 '+missedNoRep+'</span>';
    const tags=[];
    const chL=channelLabel(p);if(chL)tags.push(chL);
    if(p.academy){
      tags.push('<span class="tg tg-lv">'+(p.academy.level||'')+'</span>');
      tags.push('<span class="tg tg-spend">剩餘 '+fmt(p.academy.remaining)+'</span>');
      if(p.academy.expire)tags.push('<span class="tg">到期 '+p.academy.expire.slice(0,10)+'</span>');
    }else{
      tags.push('<span class="tg tg-spend">'+fmt(p.samplerTotal)+'</span>');
    }
    if(p.overview&&p.overview.recentPurchase)tags.push('<span class="tg">最近購課 '+p.overview.recentPurchase.slice(0,10)+'</span>');
    const igLink=p.academy&&p.academy.ig?'<a class="cig" href="https://instagram.com/'+p.academy.ig.replace(/^@/,'')+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">@'+p.academy.ig.replace(/^@/,'')+'</a>':'';
    card.innerHTML='<div class="chead" onclick="toggle(this,&#39;'+p.email+'&#39;)"><span class="cname">'+p.name+' '+igLink+'<span class="chevron" id="chev-'+eid(p.email)+'">▾</span></span><div class="ctags">'+tags.join('')+'</div><div class="sm-row">'+sm+'</div></div>'+
      '<div class="cbody" id="cb-'+eid(p.email)+'"></div>';
    list.appendChild(card);
  });
}

function toggle(el,email){
  const body=document.getElementById('cb-'+eid(email));
  const chev=document.getElementById('chev-'+eid(email));
  const open=body.classList.contains('open');
  // collapse all others
  document.querySelectorAll('.cbody.open').forEach(b=>{b.classList.remove('open');b.innerHTML='';});
  document.querySelectorAll('.chevron').forEach(c=>c.textContent='▾');
  if(!open){
    const p=PEOPLE.find(x=>x.email===email);
    body.innerHTML=detailHTML(p);
    body.classList.add('open');
    chev.textContent='▴';
  }
}

function collapse(title,summary,body){const id='x'+Math.random().toString(36).slice(2,8);return '<div class="cs" onclick="var e=document.getElementById(&#39;'+id+'&#39;);e.classList.toggle(&#39;open&#39;)"><span>'+title+'</span><span class="ct">'+summary+' ▾</span></div><div class="cb" id="'+id+'">'+body+'</div>';}

function detailHTML(p){
  const ov=p.overview;const isAc=personIsAcademy(p);let h='';

  // ── 各場出席：進度軌道（可橫向滾動）──
  h+='<div class="glabel">各場出席</div>';
  let track='';
  histSessions().forEach((s,si)=>{
    const st=sessState(p,si);const cls=st.cls.replace('st-','');
    const icon=cls==='full'?'✓':(cls==='norep'?'✓':(cls==='rep'?'↻':'—'));
    track+='<div class="track-item '+cls+'"><div class="tdot">'+icon+'</div><div class="tlabel">'+s.label+'</div><div class="tstatus">'+st.txt+'</div></div>';
  });
  h+='<div class="track-wrap"><div class="track">'+track+'</div></div>';

  const gc=(t)=>ov?ov.sections.find(s=>s.type==='certs'&&s.title===t):null;
  const gl=(kw)=>ov?ov.sections.find(s=>s.type==='courselist'&&s.title.indexOf(kw)>=0):null;
  const sub=ov?ov.sections.find(s=>s.type==='subcats'):null;
  if(ov){
    h+='<div class="glabel">學習資源總覽</div>';
    const mn=gl('正課');if(mn)h+=collapse('正課區',mn.items.length+' 堂',mn.items.length?'<div style="font-size:12px;color:#5e6160;columns:2">'+mn.items.map(x=>'<div>· '+x+'</div>').join('')+'</div>':'<div class="empty">無</div>');
    if(sub){const tot=sub.subcats.reduce((a,kv)=>a+kv[1],0);h+=collapse('案例專區',tot+' 集',sub.subcats.map(kv=>'<div class="kv"><span class="k">'+kv[0]+'</span><span>'+kv[1]+' 集</span></div>').join(''));}
    const ai=gc('AI 應用專區');if(ai)h+=collapse('AI應用專區',ai.items.length+' 堂',ai.items.length?'<div class="tags">'+ai.items.map(x=>'<span class="tag">'+x+'</span>').join('')+'</div>':'<div class="empty">無</div>');
    if(ov.metrics['廣播集數']!=null)h+='<div class="cs" style="cursor:default"><span>廣播專區</span><span class="ct">'+ov.metrics['廣播集數']+' 集</span></div>';
    const pv=gc('私享專場 · 2026');if(pv)h+=collapse('私享專場',pv.items.length+' 堂',pv.items.length?'<div class="tags">'+pv.items.map(x=>'<span class="tag">'+x+'</span>').join('')+'</div>':'<div class="empty">無</div>');
    const lg=gc('付費直播 · 2025前');if(lg)h+=collapse('付費直播',lg.items.length+' 堂',lg.items.length?'<div class="tags">'+lg.items.map(x=>'<span class="tag legacy">'+x+'</span>').join('')+'</div>':'<div class="empty">無</div>');
    const lt=gc('限時專區 · Live Talk');if(lt)h+=collapse('Live Talk',lt.items.length+' 堂',lt.items.length?'<div class="tags">'+lt.items.map(x=>'<span class="tag live">'+x+'</span>').join('')+'</div>':'<div class="empty">無</div>');
    const tr=gc('訓練營 · 受訓資格證'),ls=gc('訓練營 · 聆聽資格證');
    if(tr||ls){const tc=tr?tr.items.length:0,lc=ls?ls.items.length:0;let b='<div style="margin-bottom:6px"><div style="font-size:12px;font-weight:600;margin-bottom:3px;color:#3a3d3c">‧ 受訓資格證（'+tc+'）</div>'+(tc?'<div class="tags">'+tr.items.map(x=>'<span class="tag">'+x+'</span>').join('')+'</div>':'<div class="empty">無</div>')+'</div><div><div style="font-size:12px;font-weight:600;margin-bottom:3px;color:#3a3d3c">‧ 聆聽資格證（'+lc+'）</div>'+(lc?'<div class="tags">'+ls.items.map(x=>'<span class="tag live">'+x+'</span>').join('')+'</div>':'<div class="empty">無</div>')+'</div>';h+=collapse('訓練營','受訓 '+tc+' / 聆聽 '+lc,b);}
    const act=gc('限時專區 · 活動參與');if(act)h+=collapse('現場活動',act.items.length+' 次',act.items.length?'<div class="tags">'+act.items.map(x=>'<span class="tag">'+x+'</span>').join('')+'</div>':'<div class="empty">無</div>');
    const rf=gl('精煉');if(rf)h+=collapse('精煉研習班',rf.items.length+' 堂',rf.items.length?'<div style="font-size:12px;color:#5e6160">'+rf.items.map(x=>'<div>· '+x+'</div>').join('')+'</div>':'<div class="empty">無</div>');
  }
  let sb='';if(p.samplerCount>0){SAMPLER_CATS.concat(['其他']).forEach(cat=>{if(p.samplerCats[cat]&&p.samplerCats[cat].length)sb+='<div style="margin-bottom:6px"><span style="font-size:10px;color:#a98e5a;font-weight:600">'+cat+'</span><div class="tags" style="margin-top:3px">'+p.samplerCats[cat].map(x=>'<span class="tag">'+x+'</span>').join('')+'</div></div>';});}else sb='<div class="empty">無 Sampler 購課</div>';
  h+='<div class="glabel">Sampler 購課'+(isAc?'（補充）':'')+'</div>'+collapse('Sampler 購課',p.samplerCount+' 堂 · '+fmt(p.samplerTotal),sb);
  return h;
}

render();
</script>
</body>
</html>
